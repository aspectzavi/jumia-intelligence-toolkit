name: JIT CI

on:

  push:

    branches:
      - main
      - develop

  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install pytest

          pip install ruff

          pip install mypy

      - name: Lint

        run: ruff check .

      - name: Format Check

        run: ruff format --check .

      - name: Type Check

        run: mypy src

      - name: Run Tests

        run: pytest