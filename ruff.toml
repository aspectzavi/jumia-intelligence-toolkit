target-version = "py312"
line-length = 100

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

[lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
    "N",
    "SIM",
]

ignore = [
    "E501"
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"